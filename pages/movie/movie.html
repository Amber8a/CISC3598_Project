<!DOCTYPE html>
<html>
   <head>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
      <title>Movie Details | Nova</title>
      <link rel="stylesheet" href="../../style.css">
      <link rel="stylesheet" href="movie.css">
   </head>

   <body>
      <div class="navbar">
         <div class="navbar-container">
            <div class="logo-container">
               <a href="../../index.html" class="logo">Nova</a>
            </div>
            <div class="menu-container">
               <ul class="menu-list">
                  <li class="menu-list-item">Home</li>
                  <li class="menu-list-item active">Movies</li>
                  <li class="menu-list-item">Theatres</li>
                  <li class="menu-list-item">Popular</li>
               </ul>
            </div>
            <div class="account-container" id="accountBtn">
               <img class="account-picture" src="../../img/acc_profile.jpg" alt="">
               <div class="account-text-container">
                  <span class="account-text">Account</span>
                  <i class="fas fa-caret-down" id="accountCaret"></i>
               </div>
               <div class="account-dropdown" id="accountDropdown">
                  <div class="account-dropdown-item logged-out-item" onclick="window.location.href='../login/login.html'">
                     <i class="fas fa-sign-in-alt"></i>
                     <span>Log In</span>
                  </div>
                  <div class="account-dropdown-item logged-out-item" onclick="window.location.href='../register/register.html'">
                     <i class="fas fa-user-plus"></i>
                     <span>Create Account</span>
                  </div>
                  <div class="account-dropdown-item logged-in-item" onclick="window.location.href='../profile/profile.html'">
                     <i class="fas fa-user"></i>
                     <span>Profile</span>
                  </div>
                  <div class="account-dropdown-item logged-in-item" onclick="window.location.href='../dashboard/dashboard.html'">
                     <i class="fas fa-film"></i>
                     <span>Movie Dashboard</span>
                  </div>
                  <div class="account-dropdown-item logged-in-item" id="logoutBtn">
                     <i class="fas fa-sign-out-alt"></i>
                     <span>Log Out</span>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <div class="sidebar">
         <i class="left-menu-icon fas fa-search"></i>
         <a href="../../index.html"><i class="left-menu-icon fas fa-home"></i></a>
         <i class="left-menu-icon fas fa-bookmark"></i>
         <i class="left-menu-icon fas fa-shopping-cart"></i>
      </div>
      <div class="movie-container"> 
         <h1 id="title"></h1>
         <div class="top-section">
            <img id="poster" src="" alt="">
            <div class="info-section">
               <h2 class="header">Overview</h2>
               <p id="desc"></p>
               <a href="../../index.html" class="book-button">Book</a>
            </div>
         </div>
         <hr> 
         <div class="bottom-section">
            <h2 class="header">Watch a Trailer!</h2>
            <div id="trailer"></div>
         </div>
         
         <div id="timePopup" class="time-popup">
            <div class="popup-content">
               <h2>Book a Ticket</h2>
               <label>Select Date</label>
               <input type="date" id="bookingDate">
               <h3>Select a Time</h3>
               <div class="time-options">
                  <button class="time-btn">10:00 AM</button>
                  <button class="time-btn">1:00 PM</button>
                  <button class="time-btn">6:00 PM</button>
                  <button class="time-btn">9:00 PM</button>
               </div>
               <button id="confirmBooking" class="confirm-btn">Confirm Booking</button>
               <button id="closePopup" class="close-btn">Close</button>
            </div>
         </div>
         <script type="module" src="movie.js"></script>
      </div>
   </body>
</html>
