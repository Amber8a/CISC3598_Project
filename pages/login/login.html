<!DOCTYPE html>
<html>
   <head>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
      <title>Log In | Nova</title>
      <link rel="stylesheet" href="../../style.css">
      <link rel="stylesheet" href="login.css">
   </head>

   <body>
      <div class="navbar">
         <div class="navbar-container">
            <div class="logo-container">
               <a href="../../index.html" class="logo">Nova</a>
            </div>
            <div class="menu-container">
               <ul class="menu-list">
                  <li class="menu-list-item">Home</li>
                  <li class="menu-list-item">Movies</li>
                  <li class="menu-list-item">Theatres</li>
                  <li class="menu-list-item">Popular</li>
               </ul>
            </div>
            <div class="account-container" id="accountBtn">
               <img class="account-picture" src="../../img/acc_profile.jpg" alt="">
               <div class="account-text-container">
                  <span class="account-text">Account</span>
                  <i class="fas fa-caret-down" id="accountCaret"></i>
               </div>
               <div class="account-dropdown" id="accountDropdown">
                  <div class="account-dropdown-item logged-out-item" onclick="window.location.href='login.html'">
                     <i class="fas fa-sign-in-alt"></i>
                     <span>Log In</span>
                  </div>
                  <div class="account-dropdown-item logged-out-item" onclick="window.location.href='../register/register.html'">
                     <i class="fas fa-user-plus"></i>
                     <span>Create Account</span>
                  </div>
                  <div class="account-dropdown-item logged-in-item" onclick="window.location.href='../profile/profile.html'">
                     <i class="fas fa-user"></i>
                     <span>Profile</span>
                  </div>
                  <div class="account-dropdown-item logged-in-item" onclick="window.location.href='../dashboard/dashboard.html'">
                     <i class="fas fa-film"></i>
                     <span>Movie Dashboard</span>
                  </div>
                  <div class="account-dropdown-item logged-in-item" id="logoutBtn">
                     <i class="fas fa-sign-out-alt"></i>
                     <span>Log Out</span>
                  </div>
               </div>
            </div>
         </div>
      </div>

      <div class="sidebar">
         <i class="left-menu-icon fas fa-search"></i>
         <i class="left-menu-icon fas fa-home"></i>
         <i class="left-menu-icon fas fa-bookmark"></i>
         <i class="left-menu-icon fas fa-shopping-cart"></i>
      </div>

      <div class="container">
         <div class="content-container">
            <div class="auth-container">
               <h1 class="auth-title">Log In</h1>
               <form class="auth-form" id="loginForm">
                  <div class="auth-field">
                     <label>Email</label>
                     <input type="email" id="email" placeholder="Enter your email" required>
                  </div>
                  <div class="auth-field">
                     <label>Password</label>
                     <input type="password" id="password" placeholder="Enter your password" required>
                  </div>
                  <p class="auth-error" id="errorMsg"></p>
                  <button type="submit" class="auth-button">Log In</button>
                  <p class="auth-switch">Don't have an account? <a href="../register/register.html">Create one</a></p>
               </form>
            </div>
         </div>
      </div>

      <script type="module" src="login.js"></script>
   </body>
</html>
